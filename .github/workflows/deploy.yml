name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  repository_dispatch:
    types: [game-updated]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Check out game repos ──────────────────────────────────────────────
      - uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: anthonymaitz/shine
          path: _games/shine

      - uses: actions/checkout@v4
        with:
          repository: anthonymaitz/jetpack-geography
          path: _games/jetpack-geography

      - uses: actions/checkout@v4
        with:
          repository: anthonymaitz/simplequest
          path: _games/simplequest

      - uses: actions/checkout@v4
        with:
          repository: anthonymaitz/playsets
          path: _games/playsets

      - uses: actions/checkout@v4
        with:
          repository: anthonymaitz/space-is-listening
          path: _games/space-is-listening

      - uses: actions/checkout@v4
        with:
          repository: anthonymaitz/click-comic
          path: _games/click-comic

      - uses: actions/checkout@v4
        with:
          repository: anthonymaitz/tactical-rpg
          ref: feature/biome-entry
          path: _games/tactical-rpg

      # tactical-rpg pnpm workspace references ../simplequest (= _games/simplequest ✓)
      # and ../playsets experiments/apps/client — create a symlink to satisfy it
      - name: Symlink playsets workspace for tactical-rpg
        run: |
          mkdir -p "_games/playsets experiments/apps"
          ln -s "$(pwd)/_games/playsets/apps/client" "_games/playsets experiments/apps/client"

      # ── Node + pnpm setup ─────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      # ── Build games ───────────────────────────────────────────────────────
      - name: Build shine
        continue-on-error: true
        run: npm ci && npx vite build --base /shine/
        working-directory: _games/shine

      - name: Build jetpack-geography
        run: npm ci
        working-directory: _games/jetpack-geography
      - name: Build jetpack-geography client
        run: npx vite build --base /jetpack-geography/
        working-directory: _games/jetpack-geography/packages/client
        env:
          VITE_SERVER_URL: ${{ secrets.VITE_JETPACK_SERVER_URL }}

      - name: Build simplequest (app)
        run: npm ci && npx vite build --config vite.app.config.ts --base /simplequest/
        working-directory: _games/simplequest
      # Stash app output before lib build overwrites dist/
      - name: Stash simplequest app dist
        run: cp -r _games/simplequest/dist _games/simplequest/dist-app
      # Build lib so tactical-rpg can resolve "simple-quest" workspace dep
      - name: Build simplequest lib
        run: npm run build
        working-directory: _games/simplequest

      - name: Build playsets
        run: pnpm install
        working-directory: _games/playsets
      - name: Build playsets client (app)
        run: npx vite build --base /playsets/
        working-directory: _games/playsets/apps/client
        env:
          VITE_SIGNALING_URL: ${{ secrets.VITE_SIGNALING_URL }}
      # Stash app output before lib build overwrites dist/
      - name: Stash playsets app dist
        run: cp -r _games/playsets/apps/client/dist _games/playsets/apps/client/dist-app
      # Build lib so tactical-rpg can resolve "playsets-board" workspace dep
      - name: Build playsets lib
        run: npx vite build --config vite.lib.config.ts
        working-directory: _games/playsets/apps/client

      - name: Build space-is-listening
        run: npm ci && npx vite build --base /space-is-listening/
        working-directory: _games/space-is-listening

      - name: Build click-comic
        run: npm ci && npx vite build --base /click-comic/
        working-directory: _games/click-comic

      - name: Build tactical-rpg
        run: pnpm install
        working-directory: _games/tactical-rpg
      - name: Build tactical-rpg client
        run: pnpm --filter game exec vite build --base /tactical-rpg/
        working-directory: _games/tactical-rpg
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SERVER_URL: ${{ secrets.VITE_TACTICAL_SERVER_URL }}
          VITE_API_URL: ${{ secrets.VITE_TACTICAL_API_URL }}

      # ── Build portal ──────────────────────────────────────────────────────
      - name: Install portal deps
        run: npm ci

      - name: Install Chromium for Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Build portal
        run: npm run build

      # ── Merge game builds into portal dist ────────────────────────────────
      - name: Copy game builds
        run: |
          [ -d _games/shine/dist ] && cp -r _games/shine/dist dist/shine || true
          cp -r _games/jetpack-geography/packages/client/dist  dist/jetpack-geography
          cp -r _games/simplequest/dist-app                dist/simplequest
          cp -r _games/playsets/apps/client/dist-app      dist/playsets
          cp -r _games/space-is-listening/dist             dist/space-is-listening
          cp -r _games/click-comic/dist                    dist/click-comic
          cp -r _games/tactical-rpg/apps/game/dist         dist/tactical-rpg

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: anthony.maitz.work
